# CI GrimWar — câble les cadences de test livrées par le plan 13.12.
# Plan 13.13. Flow mixte (CLAUDE.md) : direct-push autorisé par défaut, branch
# protection bloquante sur public/data/**, scripts/data/srd-*.ts, .github/workflows/**.
#
# 4 jobs parallèles, tous bloquants :
#   static   — typecheck + lint                       (léger, pas d'émulateur)
#   unit     — test:fast                              (commit 2)
#   matrix   — test:matrix (garde-fou 13.12)          (commit 2)
#   emulator — test:rules puis test:e2e               (commit 3, Java + chromium)
#
# Node 22 : engines.node = ">=22 <26". La machine par défaut d'Adrien (v26) est
# hors range — setup-node@22 est le seul Node conforme, pas un confort.
# pnpm via corepack, version pinnée par packageManager (pnpm@9.12.3).

name: CI

on:
  push:
    branches: [main]
  pull_request:

# Annule les runs obsolètes sur la même réf (un nouveau push remplace l'ancien
# run en cours plutôt que de les empiler).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# 6 vars VITE_FIREBASE_* factices au niveau workflow (P5) — héritées par TOUS
# les jobs. env.ts:28-33 jette sur toute var requise vide, et Vite l'évalue à
# l'import de tout module qui touche firebase. Elles viennent normalement de
# .env.local, absent en CI → les jobs Vitest (unit, matrix) ET le serveur e2e
# crasheraient au boot sans elles. Valeurs de PRÉSENCE, pas des secrets : l'app
# tourne contre l'émulateur (--project demo-grimwar), jamais contre eu-west1.
# Zéro secret GitHub. Le webServer Playwright override PROJECT_ID=demo-grimwar.
env:
  VITE_FIREBASE_API_KEY: demo-api-key
  VITE_FIREBASE_AUTH_DOMAIN: demo-grimwar.firebaseapp.com
  VITE_FIREBASE_PROJECT_ID: demo-grimwar
  VITE_FIREBASE_STORAGE_BUCKET: demo-grimwar.appspot.com
  VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
  VITE_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000000000"

jobs:
  static:
    name: static (typecheck + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # corepack AVANT setup-node : active le shim pnpm pour le node système,
      # puis setup-node (cache: pnpm) localise le store via ce shim.
      - name: Enable corepack
        run: corepack enable

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  unit:
    name: unit (test:fast)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Invariants algorithmiques : src + scripts + tests/helpers (content-truth).
      # Rouge ici = bug unitaire, pas une dérive de couverture combinatoire.
      - name: Unit tests
        run: pnpm test:fast

  matrix:
    name: matrix (test:matrix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Le garde-fou anti-dérive de 13.12 : matrice combinatoire L1 + axe
      # « matrice ≡ bundle » + invariants content-truth lourds. Rouge ici =
      # une classe/persona ajoutée au bundle sans couverture, ou une dérive
      # du contenu SRD. C'est ce job qui rend la valeur de 13.12 permanente.
      - name: Matrix + content-truth
        run: pnpm test:matrix

  emulator:
    name: emulator (test:rules + test:e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node 22
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      # L'émulateur Firebase (firestore + auth) tourne sur la JVM. firebase-tools
      # 15.x exige un JDK >= 21 (« no longer supports Java version before 21 »).
      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # firebase-tools n'est pas une dépendance du repo (global chez Adrien).
      # Pinné sur la version locale d'Adrien pour que CI ≡ local.
      - name: Install firebase-tools
        run: npm install -g firebase-tools@15.18.0

      # Cache des jars de l'émulateur (gros téléchargement, ~stable par version
      # de firebase-tools).
      - name: Cache Firebase emulator jars
        uses: actions/cache@v5
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}-firebase-tools-15.18.0

      # Cache des navigateurs Playwright (clé sur la version résolue dans le lock).
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium

      # Sécurité du modèle de données (Q2). emulators:exec attend que
      # l'émulateur soit prêt avant de lancer la commande — pas de sleep manuel.
      - name: Firestore rules tests
        run: pnpm test:rules

      # Parcours utilisateur de bout en bout contre l'émulateur. retries:1 +
      # workers:1 s'activent seuls (CI=true exporté par GitHub Actions).
      - name: E2E tests
        run: pnpm test:e2e

      # Volet P4 réduit : on n'augmente jamais les retries pour masquer un flake.
      # On exporte trace/report pour diagnostiquer un échec (politique de
      # quarantaine documentée dans tests/README.md au commit 4).
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Couche (b) du flow mixte (CLAUDE.md) : filet pour les push direct --no-verify
  # et les pushes depuis une machine sans le hook .githooks/pre-push (couche a).
  # Échoue si un commit direct non-merge sur main touche un path protégé. Ne
  # tourne que sur push:main — sur une PR, toucher un path protégé est légitime.
  # Léger : git seul, ni Node ni émulateur. fetch-depth:0 pour résoudre BEFORE..AFTER.
  guard:
    name: protected-paths-guard
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Guard protected paths
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
        run: bash scripts/ci/guard-protected-paths.sh
